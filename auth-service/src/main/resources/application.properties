spring.application.name=auth-service

auth.jwt.private-key-path=keys/private_key.pem
auth.jwt.public-key-path=keys/public_key.pem
auth.jwt.issuer=http://auth-service:8081
auth.jwt.expiration-ms=86400000

server.port=8081

spring.datasource.url=jdbc:mysql://mysql-db:3306/shopdb
spring.datasource.username=user
spring.datasource.password=user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://auth-service:8081
auth.jwt.system-token=mysecrettokeninternodeauth


eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

app.cors.allowed-origins=http://localhost:3000

