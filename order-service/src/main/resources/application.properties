spring.application.name=order-service

server.port=8085

spring.datasource.url=jdbc:mysql://mysql-db:3306/shopdb

spring.datasource.username=user
spring.datasource.password=user
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

api.orders.base-path=/api/orders


app.cors.allowed-origins=http://localhost:3000

services.cart-service.base-url=http://cart-service:8084

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://auth-service:8081/.well-known/jwks.json
